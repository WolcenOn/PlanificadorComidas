<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caducidades · PlanificadorComidas</title>
  <style>
    :root { --bg:#eefaf6; --card:#fff; --text:#12302b; --muted:#5d7972; --primary:#0f9f77; --secondary:#0ea5c6; --danger:#c24141; --border:#cfe7df; --soft:#e4f7f1; --shadow:0 14px 35px rgba(13,116,104,.12); }
    *{box-sizing:border-box} body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#eefaf6 0%,#eaf8ff 100%);color:var(--text);line-height:1.45}
    header{padding:32px 20px 64px;background:linear-gradient(135deg,#0f9f77 0%,#0ea5c6 55%,#2563eb 100%);color:#fff;text-align:center} header h1{margin:0 0 8px;font-size:clamp(1.8rem,4vw,2.7rem)} header p{margin:0;opacity:.95}
    main{width:min(1180px,calc(100% - 28px));margin:-36px auto 48px;display:grid;gap:18px}.card{background:rgba(255,255,255,.96);border:1px solid var(--border);border-radius:22px;padding:18px;box-shadow:var(--shadow)}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px}.metric{border:1px solid var(--border);border-radius:16px;padding:14px;background:#f8fffd}.metric span{display:block;color:var(--muted);font-size:.9rem}.metric strong{display:block;font-size:2rem;margin-top:4px}
    h2{margin:0 0 12px}button{font:inherit;border:0;border-radius:12px;padding:10px 13px;cursor:pointer;background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;font-weight:800}button.ghost{background:linear-gradient(135deg,#e4f7f1,#e6f3ff);color:var(--text);border:1px solid var(--border)}
    .actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.muted{color:var(--muted);font-size:.92rem}.badge{display:inline-block;padding:4px 8px;border-radius:99px;font-weight:800;font-size:.82rem;background:var(--soft)}.badge.expired{background:#fde4e4;color:#991b1b}.badge.today{background:#fff4d7;color:#92400e}.badge.soon{background:#e0f2fe;color:#0369a1}.badge.freezer{background:#ede9fe;color:#5b21b6}.badge.missing-date{background:#f1f5f9;color:#475569}
    .alert-list,.item-list{display:grid;gap:10px}.item{border:1px solid var(--border);border-radius:16px;padding:12px;background:#fff}.item-top{display:flex;justify-content:space-between;gap:10px;align-items:start}.empty{border:1px dashed var(--border);border-radius:16px;padding:14px;color:var(--muted);text-align:center;background:#f8fffd}.two-columns{display:grid;grid-template-columns:minmax(280px,1fr) minmax(280px,1fr);gap:18px}code{background:#eefaf6;padding:2px 5px;border-radius:6px}@media(max-width:760px){.two-columns{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header><h1>Caducidades</h1><p>Panel de solo lectura. Las fechas se editan en Ingredientes y Platos.</p></header>
  <main>
    <section class="card"><div class="actions"><a href="./"><button type="button" class="ghost">Volver al planificador</button></a><button id="refreshBtn" type="button" class="ghost">Recalcular</button></div><p class="muted">Esta pantalla lee directamente <code>localStorage.ingredients</code> y <code>localStorage.dishes</code>. No edita fechas.</p></section>
    <section class="card"><h2>Puntuación de desperdicio</h2><div id="scoreGrid" class="grid"></div></section>
    <section class="card"><h2>Prioridad de consumo</h2><div id="alerts" class="alert-list"></div></section>
    <section class="card"><h2>Recomendaciones</h2><div id="recommendations" class="alert-list"></div></section>
    <section class="two-columns"><div class="card"><h2>Ingredientes</h2><div id="ingredientsList" class="item-list"></div></div><div class="card"><h2>Platos preparados</h2><div id="dishesList" class="item-list"></div></div></section>
  </main>
  <script src="stock-lifecycle.js?v=20260604-4"></script>
  <script>
    let ingredients=[];let dishes=[];
    function parseArray(key){try{const value=JSON.parse(localStorage.getItem(key)||"[]");return Array.isArray(value)?value:[]}catch{return[]}}
    function escapeHtml(text){return String(text??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
    function scoreClass(score){if(score<40)return"expired";if(score<70)return"today";if(score<90)return"soon";return"freezer"}
    function loadData(){ingredients=parseArray("ingredients").map(item=>StockLifecycle.normalizeIngredientStock(item));dishes=parseArray("dishes").map(item=>StockLifecycle.normalizeDishStock(item))}
    function renderScore(){const result=StockLifecycle.calculateWasteScore({ingredients,dishes},{soonDays:7});document.getElementById("scoreGrid").innerHTML=`<div class="metric"><span>Índice</span><strong>${result.score}/100</strong><span class="badge ${scoreClass(result.score)}">${escapeHtml(result.label)}</span></div><div class="metric"><span>Caducados</span><strong>${result.expiredCount}</strong></div><div class="metric"><span>Caducan hoy</span><strong>${result.todayCount}</strong></div><div class="metric"><span>Próximos 7 días</span><strong>${result.soonCount}</strong></div><div class="metric"><span>Sin fecha</span><strong>${result.missingDateCount||0}</strong></div><div class="metric"><span>Congelados antiguos</span><strong>${result.freezerCount}</strong></div>`}
    function renderAlerts(){const alerts=StockLifecycle.buildExpiryAlerts({ingredients,dishes},{soonDays:7});const box=document.getElementById("alerts");box.innerHTML="";if(!alerts.length){box.innerHTML='<div class="empty">No hay avisos de caducidad.</div>';return}alerts.forEach(alert=>{const div=document.createElement("div");div.className="item";div.innerHTML=`<div class="item-top"><div><strong>${escapeHtml(alert.name)}</strong><div class="muted">${escapeHtml(alert.itemType)} · ${escapeHtml(alert.message)}</div><div class="muted">${escapeHtml(alert.action)}</div></div><span class="badge ${escapeHtml(alert.severity)}">${escapeHtml(alert.severity)}</span></div>`;box.appendChild(div)})}
    function renderRecommendations(){const recommendations=StockLifecycle.buildConsumptionRecommendations({ingredients,dishes},{soonDays:7});const box=document.getElementById("recommendations");box.innerHTML="";if(!recommendations.length){box.innerHTML='<div class="empty">No hay recomendaciones.</div>';return}recommendations.slice(0,10).forEach(item=>{const div=document.createElement("div");div.className="item";div.innerHTML=`<div class="item-top"><div><strong>${escapeHtml(item.title)}</strong><div class="muted">${escapeHtml(item.suggestion)}</div></div><span class="badge ${escapeHtml(item.severity)}">Prioridad ${escapeHtml(item.priority)}</span></div>`;box.appendChild(div)})}
    function renderIngredients(){const target=document.getElementById("ingredientsList");target.innerHTML="";if(!ingredients.length){target.innerHTML='<div class="empty">No hay ingredientes.</div>';return}ingredients.forEach(item=>{const expiry=item.expiryDate||"";const div=document.createElement("div");div.className="item";div.innerHTML=`<div class="item-top"><div><strong>${escapeHtml(item.name||item.nombre||"Sin nombre")}</strong><div class="muted">${escapeHtml(item.qty??0)} ${escapeHtml(item.unit||item.unidad||"")}</div>${expiry?`<div class="muted">Caducidad registrada: ${escapeHtml(expiry)}</div>`:'<div class="muted">Sin caducidad registrada</div>'}</div>${expiry?`<span class="badge">${escapeHtml(expiry)}</span>`:'<span class="badge missing-date">Sin fecha</span>'}</div>`;target.appendChild(div)})}
    function renderDishes(){const target=document.getElementById("dishesList");target.innerHTML="";if(!dishes.length){target.innerHTML='<div class="empty">No hay platos preparados.</div>';return}dishes.forEach(item=>{const expiry=item.expiryDate||"";const div=document.createElement("div");div.className="item";div.innerHTML=`<div class="item-top"><div><strong>${escapeHtml(item.name||item.nombre||"Sin nombre")}</strong><div class="muted">${escapeHtml(item.qty??0)} ${escapeHtml(item.unit||item.unidad||"")}</div>${item.preparedDate?`<div class="muted">Preparado: ${escapeHtml(item.preparedDate)}</div>`:""}${expiry?`<div class="muted">Caducidad registrada: ${escapeHtml(expiry)}</div>`:'<div class="muted">Sin caducidad registrada</div>'}</div>${expiry?`<span class="badge">${escapeHtml(expiry)}</span>`:'<span class="badge missing-date">Sin fecha</span>'}</div>`;target.appendChild(div)})}
    function renderAll(){renderScore();renderAlerts();renderRecommendations();renderIngredients();renderDishes()}
    document.getElementById("refreshBtn").addEventListener("click",()=>{loadData();renderAll()});
    window.addEventListener("storage",()=>{loadData();renderAll()});
    loadData();renderAll();
  </script>
</body>
</html>
